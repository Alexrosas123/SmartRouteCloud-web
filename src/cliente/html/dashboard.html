<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Logística</title>

  <!-- 🔥 Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    #map {
      height: 400px;
      width: 100%;
      margin-top: 20px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <h1>📦 Dashboard Logística</h1>

  <button id="logout">Cerrar sesión</button>

  <h3>Resumen</h3>
  <ul>
    <li>En tránsito: <span id="transito">0</span></li>
    <li>Entregados: <span id="entregados">0</span></li>
    <li>Retrasados: <span id="retrasados">0</span></li>
  </ul>

  <h3>Mapa de envíos</h3>

  <!-- 🔥 CONTENEDOR DEL MAPA -->
  <div id="map"></div>

  <!-- 🔥 Leaflet JS -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script type="module" src="../js/dashboard.js"></script>
</body>
</html>
